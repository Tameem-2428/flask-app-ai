<!DOCTYPE html>
<html>
<head>
    <title>AI Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f0f13;
            color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 680px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.5px;
        }
        .header p {
            color: #666;
            font-size: 14px;
            margin-top: 6px;
        }
        .card {
            background: #1a1a24;
            border: 1px solid #2a2a38;
            border-radius: 16px;
            padding: 28px;
        }
        textarea {
            width: 100%;
            height: 120px;
            background: #0f0f13;
            border: 1px solid #2a2a38;
            border-radius: 10px;
            color: #e8e8e8;
            font-size: 15px;
            padding: 14px;
            resize: none;
            outline: none;
            font-family: 'Segoe UI', Arial, sans-serif;
            transition: border 0.2s;
        }
        textarea:focus {
            border-color: #6C63FF;
        }
        textarea::placeholder {
            color: #444;
        }
        button {
            width: 100%;
            background: #6C63FF;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
            transition: background 0.2s;
            letter-spacing: 0.3px;
        }
        button:hover {
            background: #5a52e0;
        }
        .answer-box {
            margin-top: 24px;
            background: #0f0f13;
            border: 1px solid #2a2a38;
            border-radius: 10px;
            padding: 20px;
        }
        .answer-label {
            font-size: 11px;
            font-weight: 600;
            color: #6C63FF;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .answer-text {
            font-size: 15px;
            color: #c8c8d8;
            line-height: 1.8;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #6C63FF;
            border-radius: 50%;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>AI Assistant</h1>
            <p>Powered by Llama 3.3 · Ask me anything</p>
        </div>
        <div class="card">
            <form action="/ask" method="POST">
                <textarea name="question" placeholder="Type your question here..."></textarea>
                <button type="submit">Ask AI</button>
            </form>
            {% if answer %}
            <div class="answer-box">
                <div class="answer-label"><span class="dot"></span>Answer</div>
                <div class="answer-text">{{ answer }}</div>
            </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
