<!DOCTYPE html>
<html>
<head>
    <title>My AI Assistant</title>
    <style>
        body { font-family: Arial; max-width: 600px; margin: 40px auto; padding: 20px; }
        textarea { width: 100%; height: 100px; padding: 10px; font-size: 14px; }
        button { background: #4F46E5; color: white; padding: 10px 24px; border: none; cursor: pointer; font-size: 14px; margin-top: 10px; }
        .answer { background: #f4f4f4; padding: 20px; margin-top: 20px; border-radius: 8px; line-height: 1.6; }
    </style>
</head>
<body>
    <h1>AI Assistant</h1>
    <form action="/ask" method="POST">
        <textarea name="question" placeholder="Ask me anything..."></textarea>
        <br>
        <button type="submit">Ask AI</button>
    </form>
    {% if answer %}
    <div class="answer">
        <strong>Answer:</strong>
        <p>{{ answer }}</p>
    </div>
    {% endif %}
</body>
</html>
